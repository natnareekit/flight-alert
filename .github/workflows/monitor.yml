name: Garuda Fare Monitor

# Runs every 6 hours (UTC). Garuda fares are quoted in THB regardless of run time.
# You can also trigger it manually from the Actions tab.
on:
  schedule:
    # 00:17, 06:17, 12:17, 18:17 UTC. The :17 offset jitters it off the hour
    # so it looks less bot-like than a clean :00 schedule.
    - cron: '17 0,6,12,18 * * *'
  workflow_dispatch: {}

# Prevent overlapping runs if one is slow.
concurrency:
  group: garuda-fare-monitor
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci || npm install

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run fare monitor
        env:
          LINE_CHANNEL_TOKEN: ${{ secrets.LINE_CHANNEL_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
        run: npm start
